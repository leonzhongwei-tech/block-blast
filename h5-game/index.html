<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<title>Block Blast - Neon Arcade</title>
<meta name="description" content="Block Blast - Free H5 Puzzle Game. Drag and drop blocks to clear rows and columns!">
<meta name="theme-color" content="#0a0a1a">
<link rel="manifest" href="/manifest.json">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;user-select:none;-webkit-user-select:none}
body{background:#0a0a1a;color:#fff;font-family:'Orbitron',-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;min-height:100dvh;overflow:hidden;touch-action:none;-webkit-touch-callout:none;-webkit-tap-highlight-color:transparent}
body::before{content:'';position:fixed;inset:0;background:radial-gradient(ellipse at 50% 30%,#0d1b2a 0%,transparent 70%),radial-gradient(circle at 30% 20%,rgba(0,204,255,.06) 0%,transparent 50%),radial-gradient(circle at 70% 80%,rgba(255,0,204,.04) 0%,transparent 50%);pointer-events:none;z-index:0}
#game-container{position:relative;z-index:1;width:100%;max-width:420px;display:flex;flex-direction:column;align-items:center;padding:16px}
header{width:100%;display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;gap:12px}
.score-box{flex:1;background:rgba(20,20,35,.8);backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);padding:10px 16px;border-radius:14px;text-align:center;border:1px solid rgba(100,100,140,.2);box-shadow:0 4px 20px rgba(0,0,0,.3)}
.score-label{font-size:10px;color:#6b7280;text-transform:uppercase;letter-spacing:2px;font-weight:400}
.score-val{font-size:26px;font-weight:700}
#score{color:#ffaa00;text-shadow:0 0 12px rgba(255,170,0,.5)}
#combo{color:#00ff88;text-shadow:0 0 12px rgba(0,255,136,.5)}
#board-canvas{background:rgba(15,15,25,.9);border-radius:16px;box-shadow:0 0 40px rgba(0,0,0,.5),inset 0 0 30px rgba(0,0,0,.3);border:1.5px solid rgba(80,80,120,.3);cursor:pointer}
#pieces-container{width:100%;display:flex;justify-content:space-around;margin-top:20px;height:100px;position:relative}
.piece-canvas{background:rgba(255,255,255,.015);border-radius:10px;cursor:grab;transition:transform .1s cubic-bezier(.23,1,.32,1);border:1px solid rgba(255,255,255,.05);will-change:transform}
.piece-canvas:active{cursor:grabbing}
.piece-canvas.dragging{transition:none}
#game-title{margin-top:12px;font-size:16px;font-weight:700;letter-spacing:4px;color:rgba(255,255,255,.5);text-shadow:0 0 8px rgba(100,100,200,.3);text-transform:uppercase}
#game-over-mask{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,.88);display:none;flex-direction:column;align-items:center;justify-content:center;z-index:100;backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px)}
#game-over-mask.show{display:flex;animation:fadeIn 300ms ease-out}
#game-over-mask h1{font-size:42px;font-weight:900;color:#ff3355;text-shadow:0 0 30px rgba(255,51,85,.6);margin-bottom:8px}
#game-over-mask .sub-text{font-size:14px;color:#6b7280;margin-bottom:4px;letter-spacing:2px;text-transform:uppercase}
#final-score{font-size:48px;font-weight:900;color:#ffaa00;text-shadow:0 0 20px rgba(255,170,0,.5);margin-bottom:32px}
#restart-btn{background:linear-gradient(135deg,#ffaa00,#ff6600);color:#000;border:none;padding:14px 36px;font-size:16px;font-weight:700;font-family:'Orbitron',sans-serif;border-radius:50px;cursor:pointer;box-shadow:0 4px 20px rgba(255,170,0,.4),0 0 40px rgba(255,170,0,.15);letter-spacing:2px;text-transform:uppercase;transition:transform .15s cubic-bezier(.23,1,.32,1)}
#restart-btn:active{transform:scale(.95)}
.combo-popup{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%) scale(.5);font-size:36px;font-weight:900;color:#00ff88;text-shadow:0 0 20px rgba(0,255,136,.8),0 0 40px rgba(0,255,136,.4);pointer-events:none;z-index:50;animation:comboPopIn 600ms ease-out forwards;white-space:nowrap}
@keyframes comboPopIn{0%{opacity:0;transform:translate(-50%,-50%) scale(.5)}30%{opacity:1;transform:translate(-50%,-50%) scale(1.3)}60%{transform:translate(-50%,-50%) scale(.95)}80%{opacity:1}100%{opacity:0;transform:translate(-50%,-50%) scale(1)}}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes spin{0%{transform:rotate(0deg)}100%{transform:rotate(360deg)}}
#loading-screen{position:fixed;top:0;left:0;width:100%;height:100%;background:#0a0a1a;display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:9999;transition:opacity .5s ease-out}
#loading-screen .loader-title{font-size:28px;font-weight:900;letter-spacing:6px;color:#ffaa00;text-shadow:0 0 20px rgba(255,170,0,.6),0 0 40px rgba(255,170,0,.3);margin-bottom:24px;text-transform:uppercase}
#loading-screen .loader-spinner{width:44px;height:44px;border:4px solid rgba(255,255,255,.08);border-top:4px solid #ffaa00;border-radius:50%;animation:spin .8s linear infinite}
#loading-screen .loader-text{margin-top:16px;font-size:11px;color:rgba(255,255,255,.35);letter-spacing:3px;text-transform:uppercase}
</style>
</head>
<body>

<!-- 优化五：CSS 骨架屏 Loading 动画 -->
<div id="loading-screen">
    <div class="loader-title">BLOCK BLAST</div>
    <div class="loader-spinner"></div>
    <div class="loader-text">Loading...</div>
</div>

<div id="game-container">
    <header>
        <div class="score-box">
            <div class="score-label">SCORE</div>
            <div id="score" class="score-val">0</div>
        </div>
        <div class="score-box">
            <div class="score-label">COMBO</div>
            <div id="combo" class="score-val">0</div>
        </div>
    </header>
    <canvas id="board-canvas" width="360" height="360"></canvas>
    <div id="pieces-container">
        <canvas id="piece-0" class="piece-canvas" width="100" height="100"></canvas>
        <canvas id="piece-1" class="piece-canvas" width="100" height="100"></canvas>
        <canvas id="piece-2" class="piece-canvas" width="100" height="100"></canvas>
    </div>
    <div id="game-title">BLOCK BLAST</div>
</div>

<div id="game-over-mask">
    <h1>GAME OVER</h1>
    <div class="sub-text">Final Score</div>
    <div id="final-score">0</div>
    <button id="restart-btn" onclick="initGame()">PLAY AGAIN</button>
</div>

<script>
var GRID_SIZE=8,BLOCK_SIZE=45,PIECE_BLOCK_SIZE=20;
var COLORS={0:"transparent",1:"#00ff88",2:"#00ccff",3:"#ff00cc",4:"#ffaa00",5:"#ff3355"};
var GLOW_COLORS={1:"rgba(0,255,136,.6)",2:"rgba(0,204,255,.6)",3:"rgba(255,0,204,.6)",4:"rgba(255,170,0,.6)",5:"rgba(255,51,85,.6)"};
var SMALL_PIECES=[{shape:[[1]],color:1},{shape:[[1,1]],color:2},{shape:[[1],[1]],color:2},{shape:[[1,1],[1,0]],color:4},{shape:[[1,1],[0,1]],color:1}];
var LARGE_PIECES=[{shape:[[1,1],[1,1]],color:3},{shape:[[1,1,1]],color:4},{shape:[[1],[1],[1]],color:4},{shape:[[1,1,1],[0,1,0]],color:5},{shape:[[1,0],[1,0],[1,1]],color:1},{shape:[[1,1,1,1]],color:3},{shape:[[1,1,1],[1,0,0]],color:2},{shape:[[1,1,1],[0,0,1]],color:5},{shape:[[1,1,1,1,1]],color:1},{shape:[[1],[1],[1],[1],[1]],color:3}];
var PIECE_SHAPES=SMALL_PIECES.concat(LARGE_PIECES);
var board=[],score=0,combo=0,currentPieces=[null,null,null],dragIdx=null,isDragging=false,startX=0,startY=0;
var ticking=false,lastTouchX=0,lastTouchY=0,animatingCells=[],isAnimating=false;
var canvas=document.getElementById('board-canvas'),ctx=canvas.getContext('2d');
var cachedRect=null;

function hideLoadingScreen(){
    var loader=document.getElementById('loading-screen');
    if(loader){loader.style.opacity='0';setTimeout(function(){loader.style.display='none';loader.remove()},500)}
}

function resizeBoard(){
    var vw=window.innerWidth,vh=window.innerHeight,maxBoard=Math.min(vw-40,vh*.52,400);
    var size=Math.floor(maxBoard/GRID_SIZE)*GRID_SIZE;
    BLOCK_SIZE=size/GRID_SIZE;canvas.width=size;canvas.height=size;
    canvas.style.width=size+'px';canvas.style.height=size+'px';
    if(board.length>0){drawBoard();for(var i=0;i<3;i++)drawPiecePreview(i)}
}

function initGame(){
    board=Array(GRID_SIZE).fill().map(function(){return Array(GRID_SIZE).fill(0)});
    score=0;combo=0;animatingCells=[];isAnimating=false;
    document.getElementById('game-over-mask').classList.remove('show');
    document.getElementById('game-over-mask').style.display='none';
    updateScoreUI();refreshPieces();drawBoard();
    hideLoadingScreen();
}

function updateScoreUI(){
    document.getElementById('score').innerText=score;
    document.getElementById('combo').innerText=combo;
}

function refreshPieces(){
    var emptyCells=0;
    for(var r=0;r<GRID_SIZE;r++)for(var c=0;c<GRID_SIZE;c++)if(board[r][c]===0)emptyCells++;
    for(var i=0;i<3;i++){
        var pool=PIECE_SHAPES;
        if(emptyCells<20&&Math.random()<.7)pool=SMALL_PIECES;
        else if(emptyCells>45&&Math.random()<.5)pool=LARGE_PIECES;
        var t=pool[Math.floor(Math.random()*pool.length)];
        currentPieces[i]=JSON.parse(JSON.stringify(t));drawPiecePreview(i);
    }
    checkGameOver();
}

function drawBoard(ghostPos){
    ctx.clearRect(0,0,canvas.width,canvas.height);
    for(var r=0;r<GRID_SIZE;r++){
        for(var c=0;c<GRID_SIZE;c++){
            var x=c*BLOCK_SIZE,y=r*BLOCK_SIZE,val=board[r][c];
            if(val===0){
                ctx.fillStyle="rgba(30,30,40,.8)";ctx.fillRect(x+1.5,y+1.5,BLOCK_SIZE-3,BLOCK_SIZE-3);
                ctx.strokeStyle="rgba(60,60,80,.35)";ctx.lineWidth=.5;ctx.strokeRect(x+1.5,y+1.5,BLOCK_SIZE-3,BLOCK_SIZE-3);
            }else{
                var color=COLORS[val],glow=GLOW_COLORS[val];
                ctx.shadowColor=glow;ctx.shadowBlur=8;ctx.fillStyle=color;
                ctx.fillRect(x+2,y+2,BLOCK_SIZE-4,BLOCK_SIZE-4);ctx.shadowBlur=0;
                ctx.fillStyle="rgba(255,255,255,.15)";ctx.fillRect(x+2,y+2,BLOCK_SIZE-4,(BLOCK_SIZE-4)*.3);
            }
        }
    }
    if(ghostPos&&dragIdx!==null&&currentPieces[dragIdx]){
        var piece=currentPieces[dragIdx],color=COLORS[piece.color];
        ctx.globalAlpha=.35;ctx.fillStyle=color;ctx.shadowColor=GLOW_COLORS[piece.color];ctx.shadowBlur=12;
        for(var r=0;r<piece.shape.length;r++){
            for(var c=0;c<piece.shape[r].length;c++){
                if(piece.shape[r][c]){
                    var br=ghostPos.row+r,bc=ghostPos.col+c;
                    if(br>=0&&br<GRID_SIZE&&bc>=0&&bc<GRID_SIZE)
                        ctx.fillRect(bc*BLOCK_SIZE+2,br*BLOCK_SIZE+2,BLOCK_SIZE-4,BLOCK_SIZE-4);
                }
            }
        }
        ctx.globalAlpha=1;ctx.shadowBlur=0;
    }
}

function drawPiecePreview(idx){
    var pCanvas=document.getElementById('piece-'+idx),pCtx=pCanvas.getContext('2d');
    pCtx.clearRect(0,0,pCanvas.width,pCanvas.height);
    var piece=currentPieces[idx];if(!piece)return;
    var color=COLORS[piece.color],glow=GLOW_COLORS[piece.color];
    var rows=piece.shape.length,cols=piece.shape[0].length;
    var offsetX=(pCanvas.width-cols*PIECE_BLOCK_SIZE)/2,offsetY=(pCanvas.height-rows*PIECE_BLOCK_SIZE)/2;
    for(var r=0;r<rows;r++){
        for(var c=0;c<cols;c++){
            if(piece.shape[r][c]){
                pCtx.shadowColor=glow;pCtx.shadowBlur=5;pCtx.fillStyle=color;
                pCtx.fillRect(offsetX+c*PIECE_BLOCK_SIZE+1,offsetY+r*PIECE_BLOCK_SIZE+1,PIECE_BLOCK_SIZE-2,PIECE_BLOCK_SIZE-2);
                pCtx.shadowBlur=0;pCtx.fillStyle="rgba(255,255,255,.2)";
                pCtx.fillRect(offsetX+c*PIECE_BLOCK_SIZE+1,offsetY+r*PIECE_BLOCK_SIZE+1,PIECE_BLOCK_SIZE-2,(PIECE_BLOCK_SIZE-2)*.3);
            }
        }
    }
}

function canPlace(piece,row,col){
    if(row<0||row+piece.shape.length>GRID_SIZE||col<0||col+piece.shape[0].length>GRID_SIZE)return false;
    for(var r=0;r<piece.shape.length;r++)
        for(var c=0;c<piece.shape[r].length;c++)
            if(piece.shape[r][c]&&board[row+r][col+c]!==0)return false;
    return true;
}

function showComboPopup(comboVal){
    var popup=document.createElement('div');popup.className='combo-popup';
    popup.textContent='COMBO \u00d7'+comboVal+'!';document.body.appendChild(popup);
    setTimeout(function(){popup.remove()},650);
}

function checkAndClear(){
    var rowsToClear=[],colsToClear=[];
    for(var r=0;r<GRID_SIZE;r++)if(board[r].every(function(v){return v!==0}))rowsToClear.push(r);
    for(var c=0;c<GRID_SIZE;c++){var f=true;for(var r=0;r<GRID_SIZE;r++)if(board[r][c]===0)f=false;if(f)colsToClear.push(c)}
    var cleared=rowsToClear.length+colsToClear.length;
    if(cleared>0){
        animatingCells=[];
        rowsToClear.forEach(function(r){for(var c=0;c<GRID_SIZE;c++)animatingCells.push({r:r,c:c,alpha:1,scale:1})});
        colsToClear.forEach(function(c){for(var r=0;r<GRID_SIZE;r++)if(!animatingCells.some(function(cell){return cell.r===r&&cell.c===c}))animatingCells.push({r:r,c:c,alpha:1,scale:1})});
        combo++;score+=cleared*10*combo;showComboPopup(combo);isAnimating=true;
        playClearAnimation(function(){
            rowsToClear.forEach(function(r){board[r].fill(0)});
            colsToClear.forEach(function(c){for(var r=0;r<GRID_SIZE;r++)board[r][c]=0});
            isAnimating=false;
            if(currentPieces.every(function(p){return p===null}))refreshPieces();
            else checkGameOver();
            updateScoreUI();drawBoard();
        });
    }else{combo=0;updateScoreUI()}
}

function playClearAnimation(onComplete){
    var step=function(){
        var anyLeft=false;
        animatingCells.forEach(function(cell){if(cell.alpha>0){cell.alpha-=.12;cell.scale-=.06;if(cell.scale<.3)cell.scale=.3;anyLeft=true}});
        drawBoard();
        animatingCells.forEach(function(cell){
            if(cell.alpha>0){
                var x=cell.c*BLOCK_SIZE,y=cell.r*BLOCK_SIZE,pad=(1-cell.scale)*BLOCK_SIZE*.5;
                ctx.fillStyle='rgba(255,255,255,'+cell.alpha*.8+')';
                ctx.fillRect(x+2+pad,y+2+pad,(BLOCK_SIZE-4)*cell.scale,(BLOCK_SIZE-4)*cell.scale);
                ctx.shadowColor='rgba(255,255,255,'+cell.alpha*.5+')';ctx.shadowBlur=12*cell.alpha;
                ctx.fillStyle='rgba(255,255,255,'+cell.alpha*.3+')';
                ctx.fillRect(x+2+pad,y+2+pad,(BLOCK_SIZE-4)*cell.scale,(BLOCK_SIZE-4)*cell.scale);ctx.shadowBlur=0;
            }
        });
        if(anyLeft)requestAnimationFrame(step);else{animatingCells=[];onComplete()}
    };
    requestAnimationFrame(step);
}

function checkGameOver(){
    var hasValidMove=false;
    for(var i=0;i<3;i++){
        if(!currentPieces[i])continue;
        for(var r=0;r<GRID_SIZE;r++){for(var c=0;c<GRID_SIZE;c++){if(canPlace(currentPieces[i],r,c)){hasValidMove=true;break}}if(hasValidMove)break}
        if(hasValidMove)break;
    }
    if(!hasValidMove&&currentPieces.some(function(p){return p!==null})){
        document.getElementById('final-score').innerText=score;
        var mask=document.getElementById('game-over-mask');mask.style.display='flex';mask.classList.add('show');
    }
}

function cacheBoardRect(){cachedRect=canvas.getBoundingClientRect()}
function getBoardCellFromClient(clientX,clientY){
    var rect=cachedRect||canvas.getBoundingClientRect();
    return{row:Math.floor((clientY-rect.top)/(rect.height/GRID_SIZE)),col:Math.floor((clientX-rect.left)/(rect.width/GRID_SIZE))};
}

function updateDragUI(clientX,clientY){
    if(dragIdx===null||!currentPieces[dragIdx])return;
    var dx=clientX-startX,dy=clientY-startY;
    var pCanvas=document.getElementById('piece-'+dragIdx);
    pCanvas.style.transform='translate3d('+dx+'px,'+dy+'px,0) scale(1.3)';
    var boardPos=getBoardCellFromClient(clientX,clientY);
    var pRows=currentPieces[dragIdx].shape.length,pCols=currentPieces[dragIdx].shape[0].length;
    var ghostRow=boardPos.row-Math.floor(pRows/2),ghostCol=boardPos.col-Math.floor(pCols/2);
    if(ghostRow>=0&&ghostRow+pRows<=GRID_SIZE&&ghostCol>=0&&ghostCol+pCols<=GRID_SIZE)drawBoard({row:ghostRow,col:ghostCol});
    else drawBoard();
}

function setupDragAndDrop(){
    for(var i=0;i<3;i++){
        (function(i){
            var pCanvas=document.getElementById('piece-'+i);
            var startDrag=function(e){
                if(!currentPieces[i]||isAnimating)return;e.preventDefault();
                cacheBoardRect();
                dragIdx=i;isDragging=true;
                var touch=e.touches?e.touches[0]:e;startX=touch.clientX;startY=touch.clientY;
                lastTouchX=startX;lastTouchY=startY;
                pCanvas.classList.add('dragging');pCanvas.style.transform="translate3d(0,0,0) scale(1.2)";pCanvas.style.zIndex="10";
            };
            pCanvas.addEventListener('mousedown',startDrag);pCanvas.addEventListener('touchstart',startDrag,{passive:false});
        })(i);
    }
    var moveDrag=function(e){
        e.preventDefault();
        if(!isDragging||dragIdx===null)return;
        var touch=e.touches?e.touches[0]:e;lastTouchX=touch.clientX;lastTouchY=touch.clientY;
        if(!ticking){window.requestAnimationFrame(function(){updateDragUI(lastTouchX,lastTouchY);ticking=false});ticking=true}
    };
    var stopDrag=function(e){
        if(!isDragging||dragIdx===null)return;isDragging=false;ticking=false;
        var pCanvas=document.getElementById('piece-'+dragIdx);pCanvas.classList.remove('dragging');
        var touch=e.changedTouches?e.changedTouches[0]:e;
        var boardPos=getBoardCellFromClient(touch.clientX,touch.clientY);
        var piece=currentPieces[dragIdx],pRows=piece.shape.length,pCols=piece.shape[0].length;
        var targetRow=boardPos.row-Math.floor(pRows/2),targetCol=boardPos.col-Math.floor(pCols/2);
        if(canPlace(piece,targetRow,targetCol)){
            for(var r=0;r<pRows;r++)for(var c=0;c<pCols;c++)if(piece.shape[r][c])board[targetRow+r][targetCol+c]=piece.color;
            score+=piece.shape.flat().filter(Boolean).length;currentPieces[dragIdx]=null;
            pCanvas.getContext('2d').clearRect(0,0,pCanvas.width,pCanvas.height);
            checkAndClear();
            if(currentPieces.every(function(p){return p===null}))refreshPieces();
            else if(!isAnimating)checkGameOver();
            updateScoreUI();
        }
        pCanvas.style.transform="translate3d(0,0,0) scale(1)";pCanvas.style.zIndex="1";dragIdx=null;drawBoard();
    };
    window.addEventListener('mousemove',moveDrag);window.addEventListener('touchmove',moveDrag,{passive:false});
    window.addEventListener('mouseup',stopDrag);window.addEventListener('touchend',stopDrag);
}

function startGame(){
    if(window._gameStarted)return;
    window._gameStarted=true;
    initGame();resizeBoard();setupDragAndDrop();
    console.log('Game initialized');
    if('serviceWorker' in navigator){
        navigator.serviceWorker.register('/sw.js').then(function(reg){
            console.log('SW registered');
        }).catch(function(err){
            console.log('SW registration failed:',err);
        });
    }
}
window.addEventListener('load',startGame);
setTimeout(startGame,3000);
window.addEventListener('resize',function(){resizeBoard();cacheBoardRect()});
</script>

<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Block Blast - Neon Arcade</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; user-select: none; -webkit-user-select: none; }
        
        body {
            background: #0a0a1a;
            color: #fff;
            font-family: 'Orbitron', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            min-height: 100dvh;
            overflow: hidden;
            touch-action: none;
            -webkit-touch-callout: none;
            -webkit-tap-highlight-color: transparent;
        }

        /* Ambient background */
        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background: 
                radial-gradient(ellipse at 50% 30%, #0d1b2a 0%, transparent 70%),
                radial-gradient(circle at 30% 20%, rgba(0,204,255,0.06) 0%, transparent 50%),
                radial-gradient(circle at 70% 80%, rgba(255,0,204,0.04) 0%, transparent 50%);
            pointer-events: none;
            z-index: 0;
        }

        #game-container {
            position: relative;
            z-index: 1;
            width: 100%;
            max-width: 420px;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 16px;
        }

        header {
            width: 100%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 16px;
            gap: 12px;
        }

        .score-box {
            flex: 1;
            background: rgba(20, 20, 35, 0.8);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            padding: 10px 16px;
            border-radius: 14px;
            text-align: center;
            border: 1px solid rgba(100, 100, 140, 0.2);
            box-shadow: 0 4px 20px rgba(0,0,0,0.3);
        }

        .score-label {
            font-size: 10px;
            color: #6b7280;
            text-transform: uppercase;
            letter-spacing: 2px;
            font-weight: 400;
        }

        .score-val {
            font-size: 26px;
            font-weight: 700;
        }

        #score {
            color: #ffaa00;
            text-shadow: 0 0 12px rgba(255,170,0,0.5);
        }

        #combo {
            color: #00ff88;
            text-shadow: 0 0 12px rgba(0,255,136,0.5);
        }

        #board-canvas {
            background: rgba(15, 15, 25, 0.9);
            border-radius: 16px;
            box-shadow: 0 0 40px rgba(0,0,0,0.5), inset 0 0 30px rgba(0,0,0,0.3);
            border: 1.5px solid rgba(80, 80, 120, 0.3);
            cursor: pointer;
        }

        #pieces-container {
            width: 100%;
            display: flex;
            justify-content: space-around;
            margin-top: 20px;
            height: 100px;
            position: relative;
        }

        .piece-canvas {
            background: rgba(255,255,255,0.015);
            border-radius: 10px;
            cursor: grab;
            transition: transform 0.1s cubic-bezier(0.23, 1, 0.32, 1);
            border: 1px solid rgba(255,255,255,0.05);
            will-change: transform;
        }

        .piece-canvas:active {
            cursor: grabbing;
        }

        .piece-canvas.dragging {
            transition: none;
        }

        #game-title {
            margin-top: 12px;
            font-size: 16px;
            font-weight: 700;
            letter-spacing: 4px;
            color: rgba(255,255,255,0.5);
            text-shadow: 0 0 8px rgba(100,100,200,0.3);
            text-transform: uppercase;
        }

        /* Game Over Overlay */
        #game-over-mask {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.88);
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 100;
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
        }

        #game-over-mask.show {
            display: flex;
            animation: fadeIn 300ms ease-out;
        }

        #game-over-mask h1 {
            font-size: 42px;
            font-weight: 900;
            color: #ff3355;
            text-shadow: 0 0 30px rgba(255,51,85,0.6);
            margin-bottom: 8px;
        }

        #game-over-mask .sub-text {
            font-size: 14px;
            color: #6b7280;
            margin-bottom: 4px;
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        #final-score {
            font-size: 48px;
            font-weight: 900;
            color: #ffaa00;
            text-shadow: 0 0 20px rgba(255,170,0,0.5);
            margin-bottom: 32px;
        }

        #restart-btn {
            background: linear-gradient(135deg, #ffaa00, #ff6600);
            color: #000;
            border: none;
            padding: 14px 36px;
            font-size: 16px;
            font-weight: 700;
            font-family: 'Orbitron', sans-serif;
            border-radius: 50px;
            cursor: pointer;
            box-shadow: 0 4px 20px rgba(255,170,0,0.4), 0 0 40px rgba(255,170,0,0.15);
            letter-spacing: 2px;
            text-transform: uppercase;
            transition: transform 0.15s cubic-bezier(0.23, 1, 0.32, 1);
        }

        #restart-btn:active {
            transform: scale(0.95);
        }

        /* Combo popup */
        .combo-popup {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%) scale(0.5);
            font-size: 36px;
            font-weight: 900;
            color: #00ff88;
            text-shadow: 0 0 20px rgba(0,255,136,0.8), 0 0 40px rgba(0,255,136,0.4);
            pointer-events: none;
            z-index: 50;
            animation: comboPopIn 600ms ease-out forwards;
            white-space: nowrap;
        }

        @keyframes comboPopIn {
            0% { opacity: 0; transform: translate(-50%, -50%) scale(0.5); }
            30% { opacity: 1; transform: translate(-50%, -50%) scale(1.3); }
            60% { transform: translate(-50%, -50%) scale(0.95); }
            80% { opacity: 1; }
            100% { opacity: 0; transform: translate(-50%, -50%) scale(1); }
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }
    </style>
</head>
<body>

<div id="game-container">
    <header>
        <div class="score-box">
            <div class="score-label">SCORE</div>
            <div id="score" class="score-val">0</div>
        </div>
        <div class="score-box">
            <div class="score-label">COMBO</div>
            <div id="combo" class="score-val">0</div>
        </div>
    </header>
    <canvas id="board-canvas" width="360" height="360"></canvas>
    <div id="pieces-container">
        <canvas id="piece-0" class="piece-canvas" width="100" height="100"></canvas>
        <canvas id="piece-1" class="piece-canvas" width="100" height="100"></canvas>
        <canvas id="piece-2" class="piece-canvas" width="100" height="100"></canvas>
    </div>
    <div id="game-title">BLOCK BLAST</div>
</div>

<div id="game-over-mask">
    <h1>GAME OVER</h1>
    <div class="sub-text">Final Score</div>
    <div id="final-score">0</div>
    <button id="restart-btn" onclick="initGame()">PLAY AGAIN</button>
</div>

<script>
// ============================================================
// Block Blast H5 - Neon Arcade Edition (Tuned)
// Performance optimizations:
//   1. RAF-throttled touch drag (no direct draw in touchmove)
//   2. translate3d GPU acceleration for piece dragging
//   3. Canvas-based clear animation (alpha fade + white overlay)
//   4. Dynamic difficulty: smart piece generation based on board state
// ============================================================

// 1. Core Configuration & Piece Pool
const GRID_SIZE = 8;
let BLOCK_SIZE = 45;
const PIECE_BLOCK_SIZE = 20;

const COLORS = {
    0: "transparent",
    1: "#00ff88",  // Neon Green
    2: "#00ccff",  // Electric Blue
    3: "#ff00cc",  // Magenta
    4: "#ffaa00",  // Amber
    5: "#ff3355"   // Hot Red
};

const GLOW_COLORS = {
    1: "rgba(0, 255, 136, 0.6)",
    2: "rgba(0, 204, 255, 0.6)",
    3: "rgba(255, 0, 204, 0.6)",
    4: "rgba(255, 170, 0, 0.6)",
    5: "rgba(255, 51, 85, 0.6)"
};

// 调优：将方块池分为小方块和大方块两组（用于动态难度）
const SMALL_PIECES = [
    { shape: [[1]], color: 1 },
    { shape: [[1, 1]], color: 2 },
    { shape: [[1],[1]], color: 2 },
    { shape: [[1,1],[1,0]], color: 4 },
    { shape: [[1,1],[0,1]], color: 1 }
];

const LARGE_PIECES = [
    { shape: [[1, 1], [1, 1]], color: 3 },
    { shape: [[1, 1, 1]], color: 4 },
    { shape: [[1],[1],[1]], color: 4 },
    { shape: [[1,1,1],[0,1,0]], color: 5 },
    { shape: [[1,0],[1,0],[1,1]], color: 1 },
    { shape: [[1,1,1,1]], color: 3 },
    { shape: [[1,1,1],[1,0,0]], color: 2 },
    { shape: [[1,1,1],[0,0,1]], color: 5 },
    { shape: [[1,1,1,1,1]], color: 1 },
    { shape: [[1],[1],[1],[1],[1]], color: 3 }
];

const PIECE_SHAPES = [...SMALL_PIECES, ...LARGE_PIECES];

// 2. Game State
let board = [];
let score = 0;
let combo = 0;
let currentPieces = [null, null, null];
let dragIdx = null;
let isDragging = false;
let startX = 0, startY = 0;

// 调优1：RAF 节流变量
let ticking = false;
let lastTouchX = 0;
let lastTouchY = 0;

// 调优2：消除动画状态
let animatingCells = [];
let isAnimating = false;

const canvas = document.getElementById('board-canvas');
const ctx = canvas.getContext('2d');

// 3. Responsive sizing
function resizeBoard() {
    const vw = window.innerWidth;
    const vh = window.innerHeight;
    const maxBoard = Math.min(vw - 40, vh * 0.52, 400);
    const size = Math.floor(maxBoard / GRID_SIZE) * GRID_SIZE;
    BLOCK_SIZE = size / GRID_SIZE;
    canvas.width = size;
    canvas.height = size;
    canvas.style.width = size + 'px';
    canvas.style.height = size + 'px';
    drawBoard();
    for (let i = 0; i < 3; i++) drawPiecePreview(i);
}

// 4. Initialize Game
function initGame() {
    board = Array(GRID_SIZE).fill().map(() => Array(GRID_SIZE).fill(0));
    score = 0;
    combo = 0;
    animatingCells = [];
    isAnimating = false;
    document.getElementById('game-over-mask').classList.remove('show');
    document.getElementById('game-over-mask').style.display = 'none';
    updateScoreUI();
    refreshPieces();
    drawBoard();
}

function updateScoreUI() {
    document.getElementById('score').innerText = score;
    document.getElementById('combo').innerText = combo;
}

// 调优3：动态难度方块生成算法
function refreshPieces() {
    // 统计棋盘上还有多少空格
    let emptyCells = 0;
    for (let r = 0; r < GRID_SIZE; r++) {
        for (let c = 0; c < GRID_SIZE; c++) {
            if (board[r][c] === 0) emptyCells++;
        }
    }

    for (let i = 0; i < 3; i++) {
        let pool = PIECE_SHAPES; // 默认全池

        // 动态难度调优：如果空格太少，70% 的概率只生成小方块，放水防止死局
        if (emptyCells < 20 && Math.random() < 0.7) {
            pool = SMALL_PIECES;
        } else if (emptyCells > 45 && Math.random() < 0.5) {
            // 空格很多时，多给大方块增加挑战
            pool = LARGE_PIECES;
        }

        const randomTemplate = pool[Math.floor(Math.random() * pool.length)];
        currentPieces[i] = JSON.parse(JSON.stringify(randomTemplate));
        drawPiecePreview(i);
    }
    checkGameOver();
}

// 5. Rendering - Neon Glow Style
function drawBoard(ghostPos = null) {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    
    for (let r = 0; r < GRID_SIZE; r++) {
        for (let c = 0; c < GRID_SIZE; c++) {
            const x = c * BLOCK_SIZE;
            const y = r * BLOCK_SIZE;
            const val = board[r][c];

            if (val === 0) {
                // Empty cell - subtle dark grid
                ctx.fillStyle = "rgba(30, 30, 40, 0.8)";
                ctx.fillRect(x + 1.5, y + 1.5, BLOCK_SIZE - 3, BLOCK_SIZE - 3);
                ctx.strokeStyle = "rgba(60, 60, 80, 0.35)";
                ctx.lineWidth = 0.5;
                ctx.strokeRect(x + 1.5, y + 1.5, BLOCK_SIZE - 3, BLOCK_SIZE - 3);
            } else {
                // Filled cell with neon glow
                const color = COLORS[val];
                const glow = GLOW_COLORS[val];

                ctx.shadowColor = glow;
                ctx.shadowBlur = 8;
                ctx.fillStyle = color;
                ctx.fillRect(x + 2, y + 2, BLOCK_SIZE - 4, BLOCK_SIZE - 4);
                ctx.shadowBlur = 0;

                // Inner highlight (top reflection)
                ctx.fillStyle = "rgba(255, 255, 255, 0.15)";
                ctx.fillRect(x + 2, y + 2, BLOCK_SIZE - 4, (BLOCK_SIZE - 4) * 0.3);
            }
        }
    }

    // Ghost shadow for drag preview
    if (ghostPos && dragIdx !== null && currentPieces[dragIdx]) {
        const piece = currentPieces[dragIdx];
        const color = COLORS[piece.color];
        ctx.globalAlpha = 0.35;
        ctx.fillStyle = color;
        ctx.shadowColor = GLOW_COLORS[piece.color];
        ctx.shadowBlur = 12;
        for (let r = 0; r < piece.shape.length; r++) {
            for (let c = 0; c < piece.shape[r].length; c++) {
                if (piece.shape[r][c]) {
                    let br = ghostPos.row + r;
                    let bc = ghostPos.col + c;
                    if (br >= 0 && br < GRID_SIZE && bc >= 0 && bc < GRID_SIZE) {
                        ctx.fillRect(bc * BLOCK_SIZE + 2, br * BLOCK_SIZE + 2, BLOCK_SIZE - 4, BLOCK_SIZE - 4);
                    }
                }
            }
        }
        ctx.globalAlpha = 1;
        ctx.shadowBlur = 0;
    }
}

function drawPiecePreview(idx) {
    const pCanvas = document.getElementById(`piece-${idx}`);
    const pCtx = pCanvas.getContext('2d');
    pCtx.clearRect(0, 0, pCanvas.width, pCanvas.height);
    
    const piece = currentPieces[idx];
    if (!piece) return;

    const color = COLORS[piece.color];
    const glow = GLOW_COLORS[piece.color];
    const rows = piece.shape.length;
    const cols = piece.shape[0].length;
    
    const offsetX = (pCanvas.width - cols * PIECE_BLOCK_SIZE) / 2;
    const offsetY = (pCanvas.height - rows * PIECE_BLOCK_SIZE) / 2;

    for (let r = 0; r < rows; r++) {
        for (let c = 0; c < cols; c++) {
            if (piece.shape[r][c]) {
                pCtx.shadowColor = glow;
                pCtx.shadowBlur = 5;
                pCtx.fillStyle = color;
                pCtx.fillRect(offsetX + c * PIECE_BLOCK_SIZE + 1, offsetY + r * PIECE_BLOCK_SIZE + 1, PIECE_BLOCK_SIZE - 2, PIECE_BLOCK_SIZE - 2);
                pCtx.shadowBlur = 0;
                // Inner highlight
                pCtx.fillStyle = "rgba(255,255,255,0.2)";
                pCtx.fillRect(offsetX + c * PIECE_BLOCK_SIZE + 1, offsetY + r * PIECE_BLOCK_SIZE + 1, PIECE_BLOCK_SIZE - 2, (PIECE_BLOCK_SIZE - 2) * 0.3);
            }
        }
    }
}

// 6. Collision Detection & Clear Logic
function canPlace(piece, row, col) {
    if (row < 0 || row + piece.shape.length > GRID_SIZE || col < 0 || col + piece.shape[0].length > GRID_SIZE) return false;
    for (let r = 0; r < piece.shape.length; r++) {
        for (let c = 0; c < piece.shape[r].length; c++) {
            if (piece.shape[r][c] && board[row + r][col + c] !== 0) return false;
        }
    }
    return true;
}

function showComboPopup(comboVal) {
    const popup = document.createElement('div');
    popup.className = 'combo-popup';
    popup.textContent = `COMBO ×${comboVal}!`;
    document.body.appendChild(popup);
    setTimeout(() => popup.remove(), 650);
}

// 调优2：Canvas 消除动画（渐隐缩放 + 白色高亮覆盖）
function checkAndClear() {
    let rowsToClear = [];
    let colsToClear = [];
    
    for (let r = 0; r < GRID_SIZE; r++) {
        if (board[r].every(val => val !== 0)) rowsToClear.push(r);
    }
    for (let c = 0; c < GRID_SIZE; c++) {
        let colFilled = true;
        for (let r = 0; r < GRID_SIZE; r++) {
            if (board[r][c] === 0) colFilled = false;
        }
        if (colFilled) colsToClear.push(c);
    }

    let cleared = rowsToClear.length + colsToClear.length;
    if (cleared > 0) {
        // 收集需要播放消除动画的格子
        animatingCells = [];
        rowsToClear.forEach(r => {
            for (let c = 0; c < GRID_SIZE; c++) {
                animatingCells.push({ r, c, alpha: 1.0, scale: 1.0 });
            }
        });
        colsToClear.forEach(c => {
            for (let r = 0; r < GRID_SIZE; r++) {
                if (!animatingCells.some(cell => cell.r === r && cell.c === c)) {
                    animatingCells.push({ r, c, alpha: 1.0, scale: 1.0 });
                }
            }
        });

        combo++;
        score += cleared * 10 * combo;
        showComboPopup(combo);
        
        // 启动消除动画循环
        isAnimating = true;
        playClearAnimation(() => {
            // 动画完全结束后，真正清除数据并刷新
            rowsToClear.forEach(r => board[r].fill(0));
            colsToClear.forEach(c => {
                for (let r = 0; r < GRID_SIZE; r++) board[r][c] = 0;
            });
            isAnimating = false;
            if (currentPieces.every(p => p === null)) {
                refreshPieces();
            } else {
                checkGameOver();
            }
            updateScoreUI();
            drawBoard();
        });
    } else {
        combo = 0;
        updateScoreUI();
    }
}

// 消除动画帧渲染
function playClearAnimation(onComplete) {
    const step = () => {
        let anyLeft = false;
        animatingCells.forEach(cell => {
            if (cell.alpha > 0) {
                cell.alpha -= 0.12;
                cell.scale -= 0.06;
                if (cell.scale < 0.3) cell.scale = 0.3;
                anyLeft = true;
            }
        });

        // 重新绘制棋盘
        drawBoard();

        // 在动画格子上覆盖白色渐隐高亮
        animatingCells.forEach(cell => {
            if (cell.alpha > 0) {
                const x = cell.c * BLOCK_SIZE;
                const y = cell.r * BLOCK_SIZE;
                const pad = (1 - cell.scale) * BLOCK_SIZE * 0.5;

                // 白色闪光覆盖
                ctx.fillStyle = `rgba(255, 255, 255, ${cell.alpha * 0.8})`;
                ctx.fillRect(x + 2 + pad, y + 2 + pad, (BLOCK_SIZE - 4) * cell.scale, (BLOCK_SIZE - 4) * cell.scale);

                // 外发光
                ctx.shadowColor = `rgba(255, 255, 255, ${cell.alpha * 0.5})`;
                ctx.shadowBlur = 12 * cell.alpha;
                ctx.fillStyle = `rgba(255, 255, 255, ${cell.alpha * 0.3})`;
                ctx.fillRect(x + 2 + pad, y + 2 + pad, (BLOCK_SIZE - 4) * cell.scale, (BLOCK_SIZE - 4) * cell.scale);
                ctx.shadowBlur = 0;
            }
        });

        if (anyLeft) {
            requestAnimationFrame(step);
        } else {
            animatingCells = [];
            onComplete();
        }
    };
    requestAnimationFrame(step);
}

function checkGameOver() {
    let hasValidMove = false;
    for (let i = 0; i < 3; i++) {
        if (!currentPieces[i]) continue;
        for (let r = 0; r < GRID_SIZE; r++) {
            for (let c = 0; c < GRID_SIZE; c++) {
                if (canPlace(currentPieces[i], r, c)) {
                    hasValidMove = true;
                    break;
                }
            }
            if (hasValidMove) break;
        }
        if (hasValidMove) break;
    }
    if (!hasValidMove && currentPieces.some(p => p !== null)) {
        document.getElementById('final-score').innerText = score;
        const mask = document.getElementById('game-over-mask');
        mask.style.display = 'flex';
        mask.classList.add('show');
    }
}

// 7. Drag & Drop Interaction - 调优1：RAF 节流 + GPU 加速
function getBoardCellFromClient(clientX, clientY) {
    const rect = canvas.getBoundingClientRect();
    const x = clientX - rect.left;
    const y = clientY - rect.top;
    const col = Math.floor(x / (rect.width / GRID_SIZE));
    const row = Math.floor(y / (rect.height / GRID_SIZE));
    return { row, col };
}

// 将 UI 渲染和逻辑分离（调优核心）
function updateDragUI(clientX, clientY) {
    if (dragIdx === null || !currentPieces[dragIdx]) return;

    const dx = clientX - startX;
    const dy = clientY - startY;
    
    const pCanvas = document.getElementById(`piece-${dragIdx}`);
    // 调优：使用 translate3d 开启硬件加速 (GPU Acceleration)
    pCanvas.style.transform = `translate3d(${dx}px, ${dy}px, 0) scale(1.3)`;

    // Calculate ghost position on board
    const boardPos = getBoardCellFromClient(clientX, clientY);
    const pRows = currentPieces[dragIdx].shape.length;
    const pCols = currentPieces[dragIdx].shape[0].length;
    const ghostRow = boardPos.row - Math.floor(pRows / 2);
    const ghostCol = boardPos.col - Math.floor(pCols / 2);

    if (ghostRow >= 0 && ghostRow + pRows <= GRID_SIZE && ghostCol >= 0 && ghostCol + pCols <= GRID_SIZE) {
        drawBoard({ row: ghostRow, col: ghostCol });
    } else {
        drawBoard();
    }
}

function setupDragAndDrop() {
    for (let i = 0; i < 3; i++) {
        const pCanvas = document.getElementById(`piece-${i}`);
        
        const startDrag = (e) => {
            if (!currentPieces[i] || isAnimating) return;
            e.preventDefault();
            dragIdx = i;
            isDragging = true;
            const touch = e.touches ? e.touches[0] : e;
            startX = touch.clientX;
            startY = touch.clientY;
            lastTouchX = startX;
            lastTouchY = startY;
            pCanvas.classList.add('dragging');
            pCanvas.style.transform = "translate3d(0, 0, 0) scale(1.2)";
            pCanvas.style.zIndex = "10";
        };

        pCanvas.addEventListener('mousedown', startDrag);
        pCanvas.addEventListener('touchstart', startDrag, { passive: false });
    }

    // 调优1：RAF 节流的 move 监听
    const moveDrag = (e) => {
        if (!isDragging || dragIdx === null) return;
        
        // 阻止浏览器默认的翻页、下拉刷新行为
        if (e.cancelable) e.preventDefault();
        
        const touch = e.touches ? e.touches[0] : e;
        lastTouchX = touch.clientX;
        lastTouchY = touch.clientY;

        // 使用 requestAnimationFrame 节流，避免在 touchmove 中直接绘图
        if (!ticking) {
            window.requestAnimationFrame(() => {
                updateDragUI(lastTouchX, lastTouchY);
                ticking = false;
            });
            ticking = true;
        }
    };

    const stopDrag = (e) => {
        if (!isDragging || dragIdx === null) return;
        isDragging = false;
        ticking = false;
        const pCanvas = document.getElementById(`piece-${dragIdx}`);
        pCanvas.classList.remove('dragging');
        
        const touch = e.changedTouches ? e.changedTouches[0] : e;
        const boardPos = getBoardCellFromClient(touch.clientX, touch.clientY);
        
        const piece = currentPieces[dragIdx];
        const pRows = piece.shape.length;
        const pCols = piece.shape[0].length;
        const targetRow = boardPos.row - Math.floor(pRows / 2);
        const targetCol = boardPos.col - Math.floor(pCols / 2);

        // Placement check
        if (canPlace(piece, targetRow, targetCol)) {
            for (let r = 0; r < pRows; r++) {
                for (let c = 0; c < pCols; c++) {
                    if (piece.shape[r][c]) board[targetRow + r][targetCol + c] = piece.color;
                }
            }
            score += piece.shape.flat().filter(Boolean).length;
            currentPieces[dragIdx] = null;
            pCanvas.getContext('2d').clearRect(0, 0, pCanvas.width, pCanvas.height);
            
            checkAndClear();
            
            // Refresh if all 3 used
            if (currentPieces.every(p => p === null)) {
                refreshPieces();
            } else if (!isAnimating) {
                checkGameOver();
            }
            updateScoreUI();
        }

        // Reset piece position
        pCanvas.style.transform = "translate3d(0, 0, 0) scale(1)";
        pCanvas.style.zIndex = "1";
        dragIdx = null;
        drawBoard();
    };

    window.addEventListener('mousemove', moveDrag);
    window.addEventListener('touchmove', moveDrag, { passive: false });
    window.addEventListener('mouseup', stopDrag);
    window.addEventListener('touchend', stopDrag);
}

// 8. Start
window.onload = () => {
    resizeBoard();
    initGame();
    setupDragAndDrop();
};

window.addEventListener('resize', () => {
    resizeBoard();
});
</script>

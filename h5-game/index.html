<script>
// ============================================================
// Audio Sprite System - 单文件加载，时间戳播放，极低延迟
// ============================================================
var AudioSprite=(function(){
    var audioCtx=null,buffer=null,loaded=false,unlocked=false;
    // 音效时间戳映射（毫秒）
    var sprites={
        place:{start:0,end:120},
        clear:{start:170,end:620},
        combo:{start:670,end:1270},
        gameover:{start:1320,end:2520}
    };

    function getContext(){
        if(!audioCtx){
            var AC=window.AudioContext||window.webkitAudioContext;
            if(AC)audioCtx=new AC();
        }
        return audioCtx;
    }

    function unlock(){
        if(unlocked)return;
        var ctx=getContext();
        if(!ctx)return;
        // iOS/Chrome 需要用户交互后 resume
        if(ctx.state==='suspended')ctx.resume();
        // 播放一个静音 buffer 解锁
        var silentBuf=ctx.createBuffer(1,1,22050);
        var src=ctx.createBufferSource();
        src.buffer=silentBuf;src.connect(ctx.destination);
        src.start(0);
        unlocked=true;
    }

    function load(){
        var ctx=getContext();
        if(!ctx)return;
        // 检测支持格式
        var audio=document.createElement('audio');
        var canWebm=audio.canPlayType('audio/webm;codecs=opus');
        var url=canWebm?'/audio/sprite.webm':'/audio/sprite.m4a';

        var xhr=new XMLHttpRequest();
        xhr.open('GET',url,true);
        xhr.responseType='arraybuffer';
        xhr.onload=function(){
            if(xhr.status===200){
                ctx.decodeAudioData(xhr.response,function(decodedBuffer){
                    buffer=decodedBuffer;
                    loaded=true;
                    console.log('Audio Sprite loaded: '+url+' ('+Math.round(xhr.response.byteLength/1024)+'KB)');
                },function(err){
                    console.warn('Audio decode failed:',err);
                });
            }
        };
        xhr.onerror=function(){console.warn('Audio Sprite load failed')};
        xhr.send();
    }

    function play(name){
        if(!loaded||!buffer)return;
        var sprite=sprites[name];
        if(!sprite)return;
        var ctx=getContext();
        if(!ctx)return;
        if(ctx.state==='suspended')ctx.resume();

        var startTime=sprite.start/1000;
        var duration=(sprite.end-sprite.start)/1000;
        var source=ctx.createBufferSource();
        source.buffer=buffer;
        // 增益节点控制音量
        var gainNode=ctx.createGain();
        gainNode.gain.value=0.6;
        source.connect(gainNode);
        gainNode.connect(ctx.destination);
        source.start(0,startTime,duration);
    }

    return{
        load:load,
        unlock:unlock,
        play:play,
        isLoaded:function(){return loaded}
    };
})();

// 首次用户交互时解锁音频上下文
document.addEventListener('touchstart',AudioSprite.unlock,{once:true,passive:true});
document.addEventListener('mousedown',AudioSprite.unlock,{once:true,passive:true});

// ============================================================
// Game Core
// ============================================================
var GRID_SIZE=8,BLOCK_SIZE=45,PIECE_BLOCK_SIZE=20;
var COLORS={0:"transparent",1:"#00ff88",2:"#00ccff",3:"#ff00cc",4:"#ffaa00",5:"#ff3355"};
var GLOW_COLORS={1:"rgba(0,255,136,.6)",2:"rgba(0,204,255,.6)",3:"rgba(255,0,204,.6)",4:"rgba(255,170,0,.6)",5:"rgba(255,51,85,.6)"};
var SMALL_PIECES=[{shape:[[1]],color:1},{shape:[[1,1]],color:2},{shape:[[1],[1]],color:2},{shape:[[1,1],[1,0]],color:4},{shape:[[1,1],[0,1]],color:1}];
var LARGE_PIECES=[{shape:[[1,1],[1,1]],color:3},{shape:[[1,1,1]],color:4},{shape:[[1],[1],[1]],color:4},{shape:[[1,1,1],[0,1,0]],color:5},{shape:[[1,0],[1,0],[1,1]],color:1},{shape:[[1,1,1,1]],color:3},{shape:[[1,1,1],[1,0,0]],color:2},{shape:[[1,1,1],[0,0,1]],color:5},{shape:[[1,1,1,1,1]],color:1},{shape:[[1],[1],[1],[1],[1]],color:3}];
var PIECE_SHAPES=SMALL_PIECES.concat(LARGE_PIECES);
var board=[],score=0,combo=0,currentPieces=[null,null,null],dragIdx=null,isDragging=false,startX=0,startY=0;
var ticking=false,lastTouchX=0,lastTouchY=0,animatingCells=[],isAnimating=false;
var ghostPos=null; // 当前拖拽 ghost 位置 {row,col} 或 null
var SNAP_THRESHOLD=0.4; // 降频检测阈值：距网格中心 < 40% 格宽时才做碰撞检测
var needsRedraw=true; // 脏标记：是否需要重绘
var clearAnimActive=false,clearAnimCallback=null; // 消除动画状态
// FPS 性能监控
var fpsFrames=0,fpsLastTime=performance.now(),fpsValue=60;
var fpsEl=null;

// ============================================================
// ParticleSystem - 消除粒子飞溅特效
// ============================================================
var ParticleSystem=(function(){
    var particles=[];
    var LIFETIME=500; // 粒子存活时间 ms
    var GRAVITY=980; // 重力加速度 px/s²
    var PARTICLE_COUNT_MIN=5,PARTICLE_COUNT_MAX=8;

    function Particle(x,y,color){
        this.x=x;this.y=y;this.color=color;
        // 随机初速度：向四周散射
        var angle=Math.random()*Math.PI*2;
        var speed=120+Math.random()*180; // 120-300 px/s
        this.vx=Math.cos(angle)*speed;
        this.vy=Math.sin(angle)*speed-80; // 略微向上偏移
        this.size=2+Math.random()*4; // 2-6px
        this.rotation=Math.random()*Math.PI*2;
        this.rotSpeed=(Math.random()-0.5)*10;
        this.born=performance.now();
        this.lifetime=LIFETIME*(0.8+Math.random()*0.4); // 400-600ms
        this.isCircle=Math.random()>0.5; // 50% 圆形 50% 矩形
    }

    function emit(cellRow,cellCol,colorVal){
        var cx=cellCol*BLOCK_SIZE+BLOCK_SIZE/2;
        var cy=cellRow*BLOCK_SIZE+BLOCK_SIZE/2;
        var color=COLORS[colorVal]||'#ffffff';
        var count=PARTICLE_COUNT_MIN+Math.floor(Math.random()*(PARTICLE_COUNT_MAX-PARTICLE_COUNT_MIN+1));
        for(var i=0;i<count;i++){
            particles.push(new Particle(cx,cy,color));
        }
    }

    function update(){
        if(particles.length===0)return false;
        var now=performance.now();
        var dt=1/60; // 假设 60fps
        var alive=[];
        for(var i=0;i<particles.length;i++){
            var p=particles[i];
            var age=now-p.born;
            if(age>=p.lifetime)continue;
            p.vy+=GRAVITY*dt;
            p.x+=p.vx*dt;
            p.y+=p.vy*dt;
            p.rotation+=p.rotSpeed*dt;
            alive.push(p);
        }
        particles=alive;
        return particles.length>0;
    }

    function draw(context){
        if(particles.length===0)return;
        var now=performance.now();
        for(var i=0;i<particles.length;i++){
            var p=particles[i];
            var age=now-p.born;
            var progress=age/p.lifetime;
            var alpha=1-progress; // 线性淡出
            var scale=1-progress*0.5; // 逐渐缩小
            context.save();
            context.globalAlpha=alpha;
            context.translate(p.x,p.y);
            context.rotate(p.rotation);
            context.fillStyle=p.color;
            var s=p.size*scale;
            if(p.isCircle){
                context.beginPath();
                context.arc(0,0,s,0,Math.PI*2);
                context.fill();
            }else{
                context.fillRect(-s,-s,s*2,s*2);
            }
            context.restore();
        }
    }

    function hasParticles(){return particles.length>0}
    function clear(){particles=[]}

    return{emit:emit,update:update,draw:draw,hasParticles:hasParticles,clear:clear};
})();

function resizeBoard(){
    var vw=window.innerWidth,vh=window.innerHeight;
    var headerH=60,piecesH=120,margins=40;
    var availH=vh-headerH-piecesH-margins;
    var availW=vw-32;
    var maxBoard=Math.min(availW,availH,400);
    var size=Math.floor(maxBoard/GRID_SIZE)*GRID_SIZE;
    BLOCK_SIZE=size/GRID_SIZE;canvas.width=size;canvas.height=size;
    canvas.style.width=size+'px';canvas.style.height=size+'px';
    var pieceSize=Math.min(Math.floor(vw*0.9/3-16),100);
    PIECE_BLOCK_SIZE=Math.max(12,Math.floor(pieceSize/5.5));
    for(var i=0;i<3;i++){
        var pc=document.getElementById('piece-'+i);
        pc.width=pieceSize;pc.height=pieceSize;
        pc.style.width=pieceSize+'px';pc.style.height=pieceSize+'px';
    }
    canvasReady=true;
    // 不直接绘制，设置脏标记让 gameLoop 处理
    needsRedraw=true;
    if(board.length>0){for(var i=0;i<3;i++)drawPiecePreview(i)}
}

function saveGameState(){
    try{
        var state={board:board,score:score,combo:combo,pieces:currentPieces,timestamp:Date.now()};
        localStorage.setItem(SAVE_KEY,JSON.stringify(state));
    }catch(e){}
}
function clearGameState(){
    localStorage.removeItem(SAVE_KEY);
}
function loadGameState(){
    try{
        var raw=localStorage.getItem(SAVE_KEY);
        if(!raw)return null;
        var state=JSON.parse(raw);
        if(state&&state.board&&state.board.length===GRID_SIZE&&typeof state.score==='number')return state;
    }catch(e){}
    return null;
}

function initGame(forceNew){
    document.getElementById('game-over-mask').classList.remove('show');
    document.getElementById('game-over-mask').style.display='none';
    hideRevivePanel();
    animatingCells=[];isAnimating=false;hasRevived=false;
    // 检查是否有未完成的对局
    if(!forceNew){
        var saved=loadGameState();
        if(saved){
            showResumeDialog(saved);
            hideLoadingScreen();
            return;
        }
    }
    // 全新开局
    board=Array(GRID_SIZE).fill().map(function(){return Array(GRID_SIZE).fill(0)});
    score=0;combo=0;
    clearGameState();
    updateScoreUI();refreshPieces();needsRedraw=true;
    // 加载 Best Score 到 UI
    var bestScore=parseInt(localStorage.getItem('bb_best_score')||'0');
    document.getElementById('best-score').innerText=bestScore;
    hideLoadingScreen();
}

function restoreGameState(saved){
    board=saved.board;
    score=saved.score;
    combo=saved.combo||0;
    currentPieces=saved.pieces;
    updateScoreUI();
    needsRedraw=true;
    for(var i=0;i<3;i++)drawPiecePreview(i);
    // 加载 Best Score
    var bestScore=parseInt(localStorage.getItem('bb_best_score')||'0');
    document.getElementById('best-score').innerText=bestScore;
}

function refreshPieces(){
    var emptyCells=0;
    for(var r=0;r<GRID_SIZE;r++)for(var c=0;c<GRID_SIZE;c++)if(board[r][c]===0)emptyCells++;
    for(var i=0;i<3;i++){
        var pool=PIECE_SHAPES;
        if(emptyCells<20&&Math.random()<.7)pool=SMALL_PIECES;
        else if(emptyCells>45&&Math.random()<.5)pool=LARGE_PIECES;
        var t=pool[Math.floor(Math.random()*pool.length)];
        currentPieces[i]=JSON.parse(JSON.stringify(t));drawPiecePreview(i);
    }
    checkGameOver();
}

function drawBoard(ghostPos){
    if(!canvasReady)return;
    ctx.clearRect(0,0,canvas.width,canvas.height);
    // 统计填充方块数，超过阈值时禁用 shadowBlur 避免 GPU 过载
    var filledCount=0;
    for(var r=0;r<GRID_SIZE;r++)for(var c=0;c<GRID_SIZE;c++)if(board[r][c]!==0)filledCount++;
    var useShadow=filledCount<30&&!isDragging;
    for(var r=0;r<GRID_SIZE;r++){
        for(var c=0;c<GRID_SIZE;c++){
            var x=c*BLOCK_SIZE,y=r*BLOCK_SIZE,val=board[r][c];
            if(val===0){
                ctx.fillStyle="rgba(30,30,40,.8)";ctx.fillRect(x+1.5,y+1.5,BLOCK_SIZE-3,BLOCK_SIZE-3);
                ctx.strokeStyle="rgba(60,60,80,.35)";ctx.lineWidth=.5;ctx.strokeRect(x+1.5,y+1.5,BLOCK_SIZE-3,BLOCK_SIZE-3);
            }else{
                var color=COLORS[val];
                if(useShadow){var glow=GLOW_COLORS[val];ctx.shadowColor=glow;ctx.shadowBlur=8;}
                ctx.fillStyle=color;
                ctx.fillRect(x+2,y+2,BLOCK_SIZE-4,BLOCK_SIZE-4);
                if(useShadow)ctx.shadowBlur=0;
                ctx.fillStyle="rgba(255,255,255,.15)";ctx.fillRect(x+2,y+2,BLOCK_SIZE-4,(BLOCK_SIZE-4)*.3);
            }
        }
    }
    if(ghostPos&&dragIdx!==null&&currentPieces[dragIdx]){
        var piece=currentPieces[dragIdx],color=COLORS[piece.color];
        ctx.globalAlpha=.35;ctx.fillStyle=color;
        for(var r=0;r<piece.shape.length;r++){
            for(var c=0;c<piece.shape[r].length;c++){
                if(piece.shape[r][c]){
                    var br=ghostPos.row+r,bc=ghostPos.col+c;
                    if(br>=0&&br<GRID_SIZE&&bc>=0&&bc<GRID_SIZE)
                        ctx.fillRect(bc*BLOCK_SIZE+2,br*BLOCK_SIZE+2,BLOCK_SIZE-4,BLOCK_SIZE-4);
                }
            }
        }
        ctx.globalAlpha=1;ctx.shadowBlur=0;
    }
}

function drawPiecePreview(idx){
    var pCanvas=document.getElementById('piece-'+idx),pCtx=pCanvas.getContext('2d');
    pCtx.clearRect(0,0,pCanvas.width,pCanvas.height);
    var piece=currentPieces[idx];if(!piece)return;
    var color=COLORS[piece.color],glow=GLOW_COLORS[piece.color];
    var rows=piece.shape.length,cols=piece.shape[0].length;
    var offsetX=(pCanvas.width-cols*PIECE_BLOCK_SIZE)/2,offsetY=(pCanvas.height-rows*PIECE_BLOCK_SIZE)/2;
    for(var r=0;r<rows;r++){
        for(var c=0;c<cols;c++){
            if(piece.shape[r][c]){
                pCtx.shadowColor=glow;pCtx.shadowBlur=5;pCtx.fillStyle=color;
                pCtx.fillRect(offsetX+c*PIECE_BLOCK_SIZE+1,offsetY+r*PIECE_BLOCK_SIZE+1,PIECE_BLOCK_SIZE-2,PIECE_BLOCK_SIZE-2);
                pCtx.shadowBlur=0;pCtx.fillStyle="rgba(255,255,255,.2)";
                pCtx.fillRect(offsetX+c*PIECE_BLOCK_SIZE+1,offsetY+r*PIECE_BLOCK_SIZE+1,PIECE_BLOCK_SIZE-2,(PIECE_BLOCK_SIZE-2)*.3);
            }
        }
    }
}

function canPlace(piece,row,col){
    if(row<0||row+piece.shape.length>GRID_SIZE||col<0||col+piece.shape[0].length>GRID_SIZE)return false;
    for(var r=0;r<piece.shape.length;r++)
        for(var c=0;c<piece.shape[r].length;c++)
            if(piece.shape[r][c]&&board[row+r][col+c]!==0)return false;
    return true;
}

function showComboPopup(comboVal){
    var popup=document.createElement('div');popup.className='combo-popup';
    popup.textContent='COMBO \u00d7'+comboVal+'!';document.body.appendChild(popup);
    setTimeout(function(){popup.remove()},650);
}

function checkAndClear(){
    var rowsToClear=[],colsToClear=[];
    for(var r=0;r<GRID_SIZE;r++)if(board[r].every(function(v){return v!==0}))rowsToClear.push(r);
    for(var c=0;c<GRID_SIZE;c++){var f=true;for(var r=0;r<GRID_SIZE;r++)if(board[r][c]===0)f=false;if(f)colsToClear.push(c)}
    var cleared=rowsToClear.length+colsToClear.length;
    if(cleared>0){
        animatingCells=[];
        // 在消除前记录每个格子的颜色并触发粒子
        var emittedSet={};
        rowsToClear.forEach(function(r){for(var c=0;c<GRID_SIZE;c++){
            animatingCells.push({r:r,c:c,alpha:1,scale:1});
            var key=r+'_'+c;
            if(!emittedSet[key]){emittedSet[key]=true;ParticleSystem.emit(r,c,board[r][c])}
        }});
        colsToClear.forEach(function(c){for(var r=0;r<GRID_SIZE;r++){
            var key=r+'_'+c;
            if(!emittedSet[key]){
                emittedSet[key]=true;
                animatingCells.push({r:r,c:c,alpha:1,scale:1});
                ParticleSystem.emit(r,c,board[r][c]);
            }
        }});
        combo++;score+=cleared*10*combo;showComboPopup(combo);isAnimating=true;
        // 音效：消除时播放 clear，连击时播放 combo
        if(combo>1)AudioSprite.play('combo');
        else AudioSprite.play('clear');
        playClearAnimation(function(){
            rowsToClear.forEach(function(r){board[r].fill(0)});
            colsToClear.forEach(function(c){for(var r=0;r<GRID_SIZE;r++)board[r][c]=0});
            isAnimating=false;
            if(currentPieces.every(function(p){return p===null}))refreshPieces();
            else checkGameOver();
            updateScoreUI();needsRedraw=true;
            saveGameState();
        });
    }else{combo=0;updateScoreUI()}
}

function playClearAnimation(onComplete){
    // 不再启动独立 RAF 循环，由 gameLoop 统一驱动
    clearAnimActive=true;
    clearAnimCallback=onComplete;
    needsRedraw=true;
}

var hasRevived=false; // 每局只能复活一次

function checkGameOver(){
    var hasValidMove=false;
    for(var i=0;i<3;i++){
        if(!currentPieces[i])continue;
        for(var r=0;r<GRID_SIZE;r++){for(var c=0;c<GRID_SIZE;c++){if(canPlace(currentPieces[i],r,c)){hasValidMove=true;break}}if(hasValidMove)break}
        if(hasValidMove)break;
    }
    if(!hasValidMove&&currentPieces.some(function(p){return p!==null})){
        // 如果还没有复活过，显示复活面板
        if(!hasRevived){
            showRevivePanel();
        }else{
            triggerGameOver();
        }
    }
}

function triggerGameOver(){
    document.getElementById('final-score').innerText=score;
    // Best Score 检查与更新
    var bestScore=parseInt(localStorage.getItem('bb_best_score')||'0');
    if(score>bestScore){
        localStorage.setItem('bb_best_score',String(score));
        document.getElementById('best-score').innerText=score;
        // 播放破纪录祝贺动画
        var bestEl=document.getElementById('best-score');
        bestEl.classList.remove('new-record-anim');
        void bestEl.offsetWidth; // 强制 reflow 重启动画
        bestEl.classList.add('new-record-anim');
        // 在 Game Over 面板显示 NEW RECORD 标识
        var newRecordEl=document.getElementById('new-record-badge');
        if(newRecordEl)newRecordEl.style.display='block';
    }else{
        var newRecordEl=document.getElementById('new-record-badge');
        if(newRecordEl)newRecordEl.style.display='none';
    }
    var mask=document.getElementById('game-over-mask');mask.style.display='flex';mask.classList.add('show');
    AudioSprite.play('gameover');
    clearGameState();
}

function showRevivePanel(){

    panel.classList.add('show');

function skipRevive(){

    triggerGameOver();
}

function reviveGame(){
    // 策略：清除棋盘上数量最多的那一种颜色的方块
    var colorCount={};
    for(var r=0;r<GRID_SIZE;r++){
        for(var c=0;c<GRID_SIZE;c++){
            var val=board[r][c];
            if(val!==0){
                colorCount[val]=(colorCount[val]||0)+1;
            }
        }
    }
    // 找到数量最多的颜色
    var maxColor=0,maxCount=0;
    for(var color in colorCount){
        if(colorCount[color]>maxCount){
            maxCount=colorCount[color];
            maxColor=parseInt(color);
        }
    }
    // 收集要清除的格子并触发粒子效果
    if(maxColor>0){
        animatingCells=[];
        for(var r=0;r<GRID_SIZE;r++){
            for(var c=0;c<GRID_SIZE;c++){
                if(board[r][c]===maxColor){
                    animatingCells.push({r:r,c:c,alpha:1,scale:1});
                    ParticleSystem.emit(r,c,maxColor);
                }
            }
        }
        AudioSprite.play('clear');
        isAnimating=true;
        playClearAnimation(function(){
            // 清除该颜色的所有方块
            for(var r=0;r<GRID_SIZE;r++){
                for(var c=0;c<GRID_SIZE;c++){
                    if(board[r][c]===maxColor)board[r][c]=0;
                }
            }
            isAnimating=false;
            needsRedraw=true;
            saveGameState();
            // 复活后重新检查是否能操作
            checkGameOver();
        });
    }else{
        // 如果棋盘已空（不应该发生），直接结束
        triggerGameOver();
    }
}

var touchOffsetY = 50; // 触控偏移：方块显示在手指上方的像素数
function cacheBoardRect(){cachedRect=canvas.getBoundingClientRect()}
function getBoardCellFromClient(clientX,clientY){
    var rect=cachedRect||canvas.getBoundingClientRect();
    return{row:Math.floor((clientY-rect.top)/(rect.height/GRID_SIZE)),col:Math.floor((clientX-rect.left)/(rect.width/GRID_SIZE))};
}

function updateDragUI(clientX,clientY){
    if(dragIdx===null||!currentPieces[dragIdx])return;
    // 只更新 CSS transform（实体跟手）
    var dx=clientX-startX,dy=(clientY-touchOffsetY)-startY;
    var pCanvas=document.getElementById('piece-'+dragIdx);
    pCanvas.style.transform='translate3d('+dx+'px,'+dy+'px,0) scale(1.3)';

    // 降频检测：计算手指距最近网格中心的偏移比例
    var rect=cachedRect||canvas.getBoundingClientRect();
    var px=clientX-rect.left,py=(clientY-touchOffsetY)-rect.top;
    var cellW=rect.width/GRID_SIZE,cellH=rect.height/GRID_SIZE;
    var colF=px/cellW,rowF=py/cellH;
    var distCol=Math.abs(colF-(Math.floor(colF)+0.5));
    var distRow=Math.abs(rowF-(Math.floor(rowF)+0.5));

    // 只有距网格中心 < SNAP_THRESHOLD 时才做碰撞检测
    if(distCol>SNAP_THRESHOLD&&distRow>SNAP_THRESHOLD){
        if(ghostPos){ghostPos=null;needsRedraw=true;}
        return;
    }

    var col=Math.floor(colF),row=Math.floor(rowF);
    var piece=currentPieces[dragIdx];
    var pRows=piece.shape.length,pCols=piece.shape[0].length;
    var ghostRow=row-Math.floor(pRows/2),ghostCol=col-Math.floor(pCols/2);
    if(canPlace(piece,ghostRow,ghostCol)){
        if(!ghostPos||ghostPos.row!==ghostRow||ghostPos.col!==ghostCol){
            ghostPos={row:ghostRow,col:ghostCol};needsRedraw=true;
        }
    }else{
        if(ghostPos){ghostPos=null;needsRedraw=true;}
    }
}

function setupDragAndDrop(){
    for(var i=0;i<3;i++){
        (function(i){
            var pCanvas=document.getElementById('piece-'+i);
            var startDrag=function(e){
                if(!currentPieces[i]||isAnimating)return;e.preventDefault();
                cacheBoardRect();
                dragIdx=i;isDragging=true;
                var touch=e.touches?e.touches[0]:e;startX=touch.clientX;startY=touch.clientY;
                lastTouchX=startX;lastTouchY=startY;
                pCanvas.classList.add('dragging');pCanvas.style.transform="translate3d(0,0,0) scale(1.2)";pCanvas.style.zIndex="10";
            };
            pCanvas.addEventListener('mousedown',startDrag);pCanvas.addEventListener('touchstart',startDrag,{passive:false});
        })(i);
    }
    var moveDrag=function(e){
        e.preventDefault();
        if(!isDragging||dragIdx===null)return;
        var touch=e.touches?e.touches[0]:e;lastTouchX=touch.clientX;lastTouchY=touch.clientY;
        if(!ticking){window.requestAnimationFrame(function(){updateDragUI(lastTouchX,lastTouchY);ticking=false});ticking=true}
    };
    var stopDrag=function(e){
        e.preventDefault(); // Block residual browser default on touchend
        if(!isDragging||dragIdx===null)return;isDragging=false;ticking=false;
        var pCanvas=document.getElementById('piece-'+dragIdx);pCanvas.classList.remove('dragging');

        // 松手判定：只有当前存在虚影时才放置
        if(ghostPos){
            var piece=currentPieces[dragIdx],pRows=piece.shape.length,pCols=piece.shape[0].length;
            for(var r=0;r<pRows;r++)for(var c=0;c<pCols;c++)if(piece.shape[r][c])board[ghostPos.row+r][ghostPos.col+c]=piece.color;
            score+=piece.shape.flat().filter(Boolean).length;currentPieces[dragIdx]=null;
            pCanvas.getContext('2d').clearRect(0,0,pCanvas.width,pCanvas.height);
            pCanvas.style.transition='none';
            pCanvas.style.transform='translate3d(0,0,0) scale(1)';
            pCanvas.style.zIndex='1';
            // 音效：放置方块
            AudioSprite.play('place');
            checkAndClear();
            if(currentPieces.every(function(p){return p===null}))refreshPieces();
            else if(!isAnimating)checkGameOver();
            updateScoreUI();
            saveGameState();
        }else{
            // 无法放置：缓动弹回动画
            pCanvas.style.transition='transform 0.3s cubic-bezier(0.23, 1, 0.32, 1)';
            pCanvas.style.transform='translate3d(0,0,0) scale(1)';
            pCanvas.style.zIndex='1';
            // 动画结束后清理 transition
            setTimeout(function(){pCanvas.style.transition='';},300);
        }
        dragIdx=null;ghostPos=null;needsRedraw=true;
    };
    window.addEventListener('mousemove',moveDrag);window.addEventListener('touchmove',moveDrag,{passive:false});
    window.addEventListener('mouseup',stopDrag);window.addEventListener('touchend',stopDrag,{passive:false});
}

// ============================================================
// 主游戏循环 (Game Loop) - 统一渲染入口
// ============================================================
function gameLoop(){
    // FPS 计算
    fpsFrames++;
    var now=performance.now();
    if(now-fpsLastTime>=1000){
        fpsValue=Math.round(fpsFrames*1000/(now-fpsLastTime));
        fpsFrames=0;fpsLastTime=now;
        if(fpsEl)fpsEl.textContent=fpsValue+' FPS';
    }

    // 消除动画步进（由 gameLoop 驱动，不再有独立 RAF）
    if(clearAnimActive){
        var anyLeft=false;
        animatingCells.forEach(function(cell){
            if(cell.alpha>0){cell.alpha-=.18;cell.scale-=.09;if(cell.scale<.3)cell.scale=.3;anyLeft=true}
        });
        var particlesAlive=ParticleSystem.update();
        needsRedraw=true;
        if(!anyLeft&&!particlesAlive){
            clearAnimActive=false;
            animatingCells=[];
            ParticleSystem.clear();
            if(clearAnimCallback){var cb=clearAnimCallback;clearAnimCallback=null;cb()}
        }
    }else if(ParticleSystem.hasParticles()){
        ParticleSystem.update();
        needsRedraw=true;
    }

    // 拖拽中持续重绘（因为 ghost 位置在变化）
    if(isDragging)needsRedraw=true;

    // 统一渲染：只在需要时绘制
    if(needsRedraw&&canvasReady){
        needsRedraw=false;
        drawBoard(ghostPos);
        // 消除闪白叠加
        if(clearAnimActive&&animatingCells.length>0){
            animatingCells.forEach(function(cell){
                if(cell.alpha>0){
                    var x=cell.c*BLOCK_SIZE,y=cell.r*BLOCK_SIZE,pad=(1-cell.scale)*BLOCK_SIZE*.5;
                    ctx.fillStyle='rgba(255,255,255,'+cell.alpha*.8+')';
                    ctx.fillRect(x+2+pad,y+2+pad,(BLOCK_SIZE-4)*cell.scale,(BLOCK_SIZE-4)*cell.scale);
                    ctx.fillStyle='rgba(255,255,255,'+cell.alpha*.3+')';
                    ctx.fillRect(x+1+pad,y+1+pad,(BLOCK_SIZE-2)*cell.scale,(BLOCK_SIZE-2)*cell.scale);
                }
            });
        }
        // 粒子叠加
        ParticleSystem.draw(ctx);
    }

    requestAnimationFrame(gameLoop);
}

function startGame(){
    if(window._gameStarted)return;
    window._gameStarted=true;
    fpsEl=document.getElementById('fps-monitor');
    initGame();resizeBoard();setupDragAndDrop();
    // 启动主循环
    requestAnimationFrame(gameLoop);
    console.log('Game initialized - RAF game loop started');
    if('serviceWorker' in navigator){
        navigator.serviceWorker.register('/sw.js').then(function(reg){
            console.log('SW registered');
        }).catch(function(err){
            console.log('SW registration failed:',err);
        });
    }
}
window.addEventListener('load',startGame);
setTimeout(startGame,3000);
window.addEventListener('resize',function(){resizeBoard();cacheBoardRect()});
</script>

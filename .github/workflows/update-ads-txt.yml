name: Daily ads.txt Update

on:
  schedule:
    - cron: '0 6 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-ads-txt:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download latest ads.txt
        run: |
          curl -L https://srv.adstxtmanager.com/19390/blockblastmini.com > h5-game/ads.txt
          echo "--- ads.txt content ---"
          cat h5-game/ads.txt

      - name: Check for changes
        id: diff
        run: |
          git diff --quiet h5-game/ads.txt && echo "changed=false" >> $GITHUB_OUTPUT || echo "changed=true" >> $GITHUB_OUTPUT

      - name: Commit and push if changed
        if: steps.diff.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add h5-game/ads.txt
          git commit -m "chore: auto-update ads.txt [$(date -u +%Y-%m-%d )]"
          git push

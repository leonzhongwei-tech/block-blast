name: Edge Cache Warmup (Globalping Global Coverage)

on:
  schedule:
    # 每 4 小时执行一次预热（UTC 0:00, 4:00, 8:00, 12:00, 16:00, 20:00）
    - cron: '0 */4 * * *'
  # 部署完成后触发
  deployment_status:
  # 手动触发
  workflow_dispatch:

env:
  SITE_DOMAIN: block-blast-one-ruddy.vercel.app
  GLOBALPING_TOKEN: ${{ secrets.GLOBALPING_TOKEN }}

jobs:
  warmup-south-america:
    runs-on: ubuntu-latest
    if: github.event_name != 'deployment_status' || github.event.deployment_status.state == 'success'
    steps:
      - name: "🌎 South America - 10 nodes (Brazil, Chile, Argentina, Colombia, Uruguay)"
        run: |
          RESOURCES="/ /audio/sprite.webm /audio/sprite.m4a /sw.js /manifest.json"
          for path in $RESOURCES; do
            echo "  → SA probe: $path"
            curl -s -X POST https://api.globalping.io/v1/measurements \
              -H "Content-Type: application/json" \
              -H "Authorization: Bearer $GLOBALPING_TOKEN" \
              -d "{
                \"type\": \"http\",
                \"target\": \"$SITE_DOMAIN\",
                \"locations\": [
                  {\"country\": \"BR\", \"limit\": 4},
                  {\"country\": \"CL\", \"limit\": 2},
                  {\"country\": \"AR\", \"limit\": 2},
                  {\"country\": \"CO\", \"limit\": 1},
                  {\"country\": \"UY\", \"limit\": 1}
                ],
                \"measurementOptions\": {
                  \"protocol\": \"HTTPS\",
                  \"port\": 443,
                  \"request\": {
                    \"method\": \"GET\",
                    \"path\": \"$path\",
                    \"headers\": {\"Accept-Encoding\": \"br, gzip\"}
                  }
                }
              }" | jq -r '.id // "failed"'
            sleep 1
          done

  warmup-southeast-asia:
    runs-on: ubuntu-latest
    if: github.event_name != 'deployment_status' || github.event.deployment_status.state == 'success'
    steps:
      - name: "🌏 Southeast Asia - 10 nodes (Singapore, Malaysia, Indonesia, Thailand, Vietnam)"
        run: |
          RESOURCES="/ /audio/sprite.webm /audio/sprite.m4a /sw.js /manifest.json"
          for path in $RESOURCES; do
            echo "  → SEA probe: $path"
            curl -s -X POST https://api.globalping.io/v1/measurements \
              -H "Content-Type: application/json" \
              -H "Authorization: Bearer $GLOBALPING_TOKEN" \
              -d "{
                \"type\": \"http\",
                \"target\": \"$SITE_DOMAIN\",
                \"locations\": [
                  {\"country\": \"SG\", \"limit\": 3},
                  {\"country\": \"MY\", \"limit\": 2},
                  {\"country\": \"ID\", \"limit\": 2},
                  {\"country\": \"TH\", \"limit\": 1},
                  {\"country\": \"VN\", \"limit\": 1},
                  {\"country\": \"PH\", \"limit\": 1}
                ],
                \"measurementOptions\": {
                  \"protocol\": \"HTTPS\",
                  \"port\": 443,
                  \"request\": {
                    \"method\": \"GET\",
                    \"path\": \"$path\",
                    \"headers\": {\"Accept-Encoding\": \"br, gzip\"}
                  }
                }
              }" | jq -r '.id // "failed"'
            sleep 1
          done

  warmup-east-asia:
    runs-on: ubuntu-latest
    if: github.event_name != 'deployment_status' || github.event.deployment_status.state == 'success'
    steps:
      - name: "🌏 East Asia - 8 nodes (Japan, Hong Kong, Taiwan, South Korea)"
        run: |
          RESOURCES="/ /audio/sprite.webm /audio/sprite.m4a /sw.js /manifest.json"
          for path in $RESOURCES; do
            echo "  → East Asia probe: $path"
            curl -s -X POST https://api.globalping.io/v1/measurements \
              -H "Content-Type: application/json" \
              -H "Authorization: Bearer $GLOBALPING_TOKEN" \
              -d "{
                \"type\": \"http\",
                \"target\": \"$SITE_DOMAIN\",
                \"locations\": [
                  {\"country\": \"JP\", \"limit\": 3},
                  {\"country\": \"HK\", \"limit\": 2},
                  {\"country\": \"TW\", \"limit\": 2},
                  {\"country\": \"KR\", \"limit\": 1}
                ],
                \"measurementOptions\": {
                  \"protocol\": \"HTTPS\",
                  \"port\": 443,
                  \"request\": {
                    \"method\": \"GET\",
                    \"path\": \"$path\",
                    \"headers\": {\"Accept-Encoding\": \"br, gzip\"}
                  }
                }
              }" | jq -r '.id // "failed"'
            sleep 1
          done

  warmup-india-middle-east:
    runs-on: ubuntu-latest
    if: github.event_name != 'deployment_status' || github.event.deployment_status.state == 'success'
    steps:
      - name: "🌍 India & Middle East - 8 nodes"
        run: |
          RESOURCES="/ /audio/sprite.webm /audio/sprite.m4a /sw.js /manifest.json"
          for path in $RESOURCES; do
            echo "  → India/ME probe: $path"
            curl -s -X POST https://api.globalping.io/v1/measurements \
              -H "Content-Type: application/json" \
              -H "Authorization: Bearer $GLOBALPING_TOKEN" \
              -d "{
                \"type\": \"http\",
                \"target\": \"$SITE_DOMAIN\",
                \"locations\": [
                  {\"country\": \"IN\", \"limit\": 4},
                  {\"country\": \"AE\", \"limit\": 2},
                  {\"country\": \"SA\", \"limit\": 1},
                  {\"country\": \"IL\", \"limit\": 1}
                ],
                \"measurementOptions\": {
                  \"protocol\": \"HTTPS\",
                  \"port\": 443,
                  \"request\": {
                    \"method\": \"GET\",
                    \"path\": \"$path\",
                    \"headers\": {\"Accept-Encoding\": \"br, gzip\"}
                  }
                }
              }" | jq -r '.id // "failed"'
            sleep 1
          done

  warmup-africa:
    runs-on: ubuntu-latest
    if: github.event_name != 'deployment_status' || github.event.deployment_status.state == 'success'
    steps:
      - name: "🌍 Africa - 6 nodes (South Africa, Nigeria, Kenya, Egypt)"
        run: |
          RESOURCES="/ /audio/sprite.webm /audio/sprite.m4a /sw.js /manifest.json"
          for path in $RESOURCES; do
            echo "  → Africa probe: $path"
            curl -s -X POST https://api.globalping.io/v1/measurements \
              -H "Content-Type: application/json" \
              -H "Authorization: Bearer $GLOBALPING_TOKEN" \
              -d "{
                \"type\": \"http\",
                \"target\": \"$SITE_DOMAIN\",
                \"locations\": [
                  {\"country\": \"ZA\", \"limit\": 2},
                  {\"country\": \"NG\", \"limit\": 2},
                  {\"country\": \"KE\", \"limit\": 1},
                  {\"country\": \"EG\", \"limit\": 1}
                ],
                \"measurementOptions\": {
                  \"protocol\": \"HTTPS\",
                  \"port\": 443,
                  \"request\": {
                    \"method\": \"GET\",
                    \"path\": \"$path\",
                    \"headers\": {\"Accept-Encoding\": \"br, gzip\"}
                  }
                }
              }" | jq -r '.id // "failed"'
            sleep 1
          done

  warmup-oceania-europe:
    runs-on: ubuntu-latest
    if: github.event_name != 'deployment_status' || github.event.deployment_status.state == 'success'
    steps:
      - name: "🌏 Oceania - 4 nodes (Australia, New Zealand)"
        run: |
          RESOURCES="/ /audio/sprite.webm /audio/sprite.m4a /sw.js /manifest.json"
          for path in $RESOURCES; do
            echo "  → Oceania probe: $path"
            curl -s -X POST https://api.globalping.io/v1/measurements \
              -H "Content-Type: application/json" \
              -H "Authorization: Bearer $GLOBALPING_TOKEN" \
              -d "{
                \"type\": \"http\",
                \"target\": \"$SITE_DOMAIN\",
                \"locations\": [
                  {\"country\": \"AU\", \"limit\": 3},
                  {\"country\": \"NZ\", \"limit\": 1}
                ],
                \"measurementOptions\": {
                  \"protocol\": \"HTTPS\",
                  \"port\": 443,
                  \"request\": {
                    \"method\": \"GET\",
                    \"path\": \"$path\",
                    \"headers\": {\"Accept-Encoding\": \"br, gzip\"}
                  }
                }
              }" | jq -r '.id // "failed"'
            sleep 1
          done

      - name: "🌍 Eastern Europe - 6 nodes (Poland, Romania, Turkey, Ukraine)"
        run: |
          RESOURCES="/ /audio/sprite.webm /audio/sprite.m4a /sw.js /manifest.json"
          for path in $RESOURCES; do
            echo "  → East EU probe: $path"
            curl -s -X POST https://api.globalping.io/v1/measurements \
              -H "Content-Type: application/json" \
              -H "Authorization: Bearer $GLOBALPING_TOKEN" \
              -d "{
                \"type\": \"http\",
                \"target\": \"$SITE_DOMAIN\",
                \"locations\": [
                  {\"country\": \"PL\", \"limit\": 2},
                  {\"country\": \"RO\", \"limit\": 1},
                  {\"country\": \"TR\", \"limit\": 2},
                  {\"country\": \"UA\", \"limit\": 1}
                ],
                \"measurementOptions\": {
                  \"protocol\": \"HTTPS\",
                  \"port\": 443,
                  \"request\": {
                    \"method\": \"GET\",
                    \"path\": \"$path\",
                    \"headers\": {\"Accept-Encoding\": \"br, gzip\"}
                  }
                }
              }" | jq -r '.id // "failed"'
            sleep 1
          done

  verify-global-coverage:
    runs-on: ubuntu-latest
    needs: [warmup-south-america, warmup-southeast-asia, warmup-east-asia, warmup-india-middle-east, warmup-africa, warmup-oceania-europe]
    steps:
      - name: "📊 Global verification measurement"
        run: |
          echo "Launching global verification probe..."
          RESPONSE=$(curl -s -X POST https://api.globalping.io/v1/measurements \
            -H "Content-Type: application/json" \
            -H "Authorization: Bearer $GLOBALPING_TOKEN" \
            -d "{
              \"type\": \"http\",
              \"target\": \"$SITE_DOMAIN\",
              \"locations\": [
                {\"continent\": \"SA\", \"limit\": 5},
                {\"continent\": \"AS\", \"limit\": 8},
                {\"continent\": \"AF\", \"limit\": 3},
                {\"continent\": \"EU\", \"limit\": 5},
                {\"continent\": \"OC\", \"limit\": 2}
              ],
              \"measurementOptions\": {
                \"protocol\": \"HTTPS\",
                \"port\": 443,
                \"request\": {
                  \"method\": \"GET\",
                  \"path\": \"/\",
                  \"headers\": {\"Accept-Encoding\": \"br, gzip\"}
                }
              }
            }")
          
          MEASUREMENT_ID=$(echo "$RESPONSE" | jq -r '.id // empty')
          PROBES=$(echo "$RESPONSE" | jq -r '.probesCount // 0')
          echo "Measurement: $MEASUREMENT_ID (${PROBES} probes)"
          
          sleep 12
          
          echo ""
          echo "┌─────────────────────────────────────────────────────────────────────────┐"
          echo "│                    GLOBAL EDGE CACHE WARMUP REPORT                       │"
          echo "└─────────────────────────────────────────────────────────────────────────┘"
          echo ""
          
          if [ -n "$MEASUREMENT_ID" ]; then
            curl -s -H "Authorization: Bearer $GLOBALPING_TOKEN" \
              "https://api.globalping.io/v1/measurements/$MEASUREMENT_ID" | \
              jq -r '.results[] | "\(.probe.continent) | \(.probe.city), \(.probe.country) | TTFB: \(.result.timings.firstByte)ms | Total: \(.result.timings.total)ms | Cache: \(.result.headers["x-vercel-cache"] // "N/A")"' | \
              sort
          fi
          
          echo ""
          echo "✅ Global edge cache warmup complete!"
          echo "   Coverage: SA (10) + SEA (10) + East Asia (8) + India/ME (8) + Africa (6) + Oceania (4) + East EU (6) = 52 nodes"
          echo "   Resources warmed: / + /audio/sprite.webm + /audio/sprite.m4a + /sw.js + /manifest.json"

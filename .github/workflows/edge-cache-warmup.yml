name: Edge Cache Warmup (Brazil & Southeast Asia)

on:
  schedule:
    # Run every 6 hours to keep edge caches warm
    - cron: '0 */6 * * *'
  workflow_dispatch:
    # Allow manual trigger

jobs:
  warmup:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        # Target regions: Brazil (gru1) and Southeast Asia (sin1, hkg1)
        region:
          - name: "Brazil (São Paulo)"
            url: "https://block-blast-one-ruddy.vercel.app"
          - name: "Singapore"
            url: "https://block-blast-one-ruddy.vercel.app"
          - name: "Hong Kong"
            url: "https://block-blast-one-ruddy.vercel.app"
    steps:
      - name: Warm up edge cache for ${{ matrix.region.name }}
        run: |
          echo "🔥 Warming cache for ${{ matrix.region.name }}..."
          
          # Request main page to populate CDN cache
          curl -s -o /dev/null -w "HTTP %{http_code} | Time: %{time_total}s | Size: %{size_download}B\n" \
            -H "Accept: text/html" \
            "${{ matrix.region.url }}/"
          
          # Request Service Worker
          curl -s -o /dev/null -w "SW: HTTP %{http_code} | Time: %{time_total}s\n" \
            "${{ matrix.region.url }}/sw.js"
          
          # Request manifest
          curl -s -o /dev/null -w "Manifest: HTTP %{http_code} | Time: %{time_total}s\n" \
            "${{ matrix.region.url }}/manifest.json"
          
          echo "✅ Cache warmup complete for ${{ matrix.region.name }}"

      - name: Verify cache headers
        run: |
          echo "📋 Checking cache headers..."
          curl -sI "${{ matrix.region.url }}/" | grep -i "cache\|x-vercel\|age"
          echo "---"
          curl -sI "${{ matrix.region.url }}/sw.js" | grep -i "cache\|x-vercel\|age"

  warmup-custom-domain:
    runs-on: ubuntu-latest
    steps:
      - name: Warm up custom domain edge cache
        run: |
          DOMAINS=("block-blast-one-ruddy.vercel.app")
          
          for domain in "${DOMAINS[@]}"; do
            echo "🌐 Warming: $domain"
            
            # Multiple requests to ensure propagation across PoPs
            for i in 1 2 3; do
              curl -s -o /dev/null -w "  Request $i: HTTP %{http_code} | %{time_total}s\n" \
                "https://$domain/"
              sleep 1
            done
            
            echo "---"
          done
          
          echo "✅ All domains warmed"
